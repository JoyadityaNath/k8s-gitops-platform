apiVersion: app/v1
kind: Deployment
metadata:
  name: user-deployment
  labels:
    app: users
spec:
  replicas: 3
  selector:
    matchLabels:
      app: users
  template:
    metadata:
      labels:
        app: users
    spec:
      containers:
        - name: users
          image: joyadityan/user-service
          ports:
            - containerPort: 5001
