apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-deployment
  labels:
    app: orders
spec:
  replicas: 3
  selector:
    matchLabels:
      app: orders
  template:
    metadata:
      labels:
        app: orders
    spec:
      containers:
        - name: orders
          image: joyadityan/orders-service
          ports:
            - containerPort: 5002
